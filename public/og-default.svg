<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03" fill="white">
    <circle cx="100" cy="100" r="200"/>
    <circle cx="1100" cy="530" r="300"/>
    <circle cx="600" cy="315" r="150"/>
  </g>

  <!-- Swap arrows icon -->
  <g transform="translate(600, 180)" filter="url(#shadow)">
    <path d="M-40,-20 L-40,-40 L-80,0 L-40,40 L-40,20 L20,20 L20,40 L60,0 L20,-40 L20,-20 Z" fill="#0ea5e9" opacity="0.9"/>
    <path d="M40,20 L40,40 L80,0 L40,-40 L40,-20 L-20,-20 L-20,-40 L-60,0 L-20,40 L-20,20 Z" fill="#38bdf8" opacity="0.7" transform="translate(0, 10) scale(0.8)"/>
  </g>

  <!-- Main title -->
  <text x="600" y="340" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">MoveMyTest</text>

  <!-- Tagline -->
  <text x="600" y="400" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)" text-anchor="middle">Free Driving Test Swaps · DVSA Compliant · Private &amp; Secure</text>

  <!-- URL -->
  <text x="600" y="480" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">www.movemytest.co.uk</text>

  <!-- Accent line -->
  <rect x="500" y="430" width="200" height="3" rx="1.5" fill="#0ea5e9" opacity="0.8"/>
</svg>